<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUDY Travels | Your Passport to Stress-Free Travel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { petal: '#fdf2f0', brandPink: '#e8a9a2', brandBlue: '#2c3e50' }, fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
    </script>
    <style>
        html { scroll-padding-top: 80px; }
        body { background-color: #ffffff; color: #4a4a4a; }
        .navbar { height: 80px; background-color: #ffffff; display: flex; align-items: center; }
        .nav-link { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600; color: #2c3e50; transition: color 0.3s ease; cursor: pointer; }
        .nav-link:hover { color: #e8a9a2; }
        .btn-inquire { background-color: #e8a9a2; color: white !important; padding: 0.7rem 1.8rem; border-radius: 9999px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; transition: all 0.3s ease; display: inline-block; cursor: pointer; }
        .btn-inquire:hover { background-color: #2c3e50; }
        .pink-gradient { background: linear-gradient(to bottom, #ffffff, #fdf2f0); }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
    </style>
</head>
<body class="font-sans antialiased bg-white">
    <nav class="navbar sticky top-0 z-50 border-b border-petal px-6 md:px-12">
        <div class="max-w-7xl mx-auto flex items-center justify-between w-full">
            <a href="#" onclick="showHome()" class="text-2xl font-serif font-bold text-brandBlue">HUDY<span class="text-brandPink italic font-normal">Travels</span></a>
            <div class="hidden md:flex gap-8 items-center">
                <a href="#" class="nav-link" onclick="showDirectory()">Guesthouses / Resorts</a>
                <a href="#destinations" class="nav-link" onclick="showHome()">The Maldives</a>
                <a href="#services" class="nav-link" onclick="showHome()">Travel Services</a>
                <a href="#gallery" class="nav-link" onclick="showHome()">Gallery</a>
                <a href="#about" class="nav-link" onclick="showHome()">The Curator</a>
                <a href="#contact" class="btn-inquire" onclick="showHome()">Plan Your Trip</a>
            </div>
        </div>
    </nav>

    <div id="home-content">
        <section class="px-6 py-24 pink-gradient flex items-center justify-center min-h-[60vh]">
            <div class="max-w-3xl mx-auto text-center">
                <h1 class="font-serif text-5xl md:text-7xl text-brandBlue mb-8">Curated island escapes,<br><span class="italic text-brandPink">just for you</span></h1>
            </div>
        </section>
    </div>

    <div id="directory-content" class="hidden min-h-screen bg-white py-20 px-6">
        <div class="max-w-7xl mx-auto">
            <button onclick="showHome()" class="mb-10 text-brandPink"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
            
            <h2 class="font-serif text-5xl text-brandBlue mb-12">Guesthouses</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-20">
                <!-- 10 Guesthouse Cards with Links -->
                <script>
                    const guesthouses = [
                        { name: "Season Paradise", loc: "Thulusdhoo", desc: "Known for rooftop infinity pool." },
                        { name: "Stone Hotels", loc: "Dhiffushi", desc: "4-star with private beach." },
                        { name: "Kaani Palm Beach", loc: "Maafushi", desc: "Expansive rooftop infinity pool." },
                        { name: "Arena Beach Hotel", loc: "Maafushi", desc: "Ocean views and excursions." },
                        { name: "Plumeria Maldives", loc: "Thinadhoo", desc: "Well-equipped dive center." },
                        { name: "The Barefoot Eco Hotel", loc: "Hanimaadhoo", desc: "Eco-friendly marine focus." },
                        { name: "h78", loc: "Hulhumale", desc: "Boutique near the airport." },
                        { name: "Triton Prestige", loc: "Maafushi", desc: "Premium spa and modern." },
                        { name: "Bliss Dhigurah", loc: "Dhigurah", desc: "Whale shark/manta sites." },
                        { name: "Hotel Ocean Grand", loc: "Hulhumale", desc: "Great service, ideal transit." }
                    ];
                    guesthouses.forEach(gh => {
                        document.write(`
                            <div class="bg-white border border-petal rounded-3xl overflow-hidden p-4">
                                <img src="https://images.unsplash.com/photo-1596422846543-75c6fc197f07?w=500" class="card-img rounded-2xl mb-4">
                                <h4 class="font-bold text-brandBlue">${gh.name}</h4>
                                <p class="text-xs text-brandPink">${gh.loc}</p>
                                <p class="text-xs text-gray-500 mt-2">${gh.desc}</p>
                                <a href="#" class="text-[10px] text-brandPink uppercase mt-4 block font-bold underline">View Details →</a>
                            </div>
                        `);
                    });
                </script>
            </div>

            <h2 class="font-serif text-5xl text-brandBlue mb-12">Resorts</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <!-- 10 Resort Cards with Links -->
                <script>
                    const resorts = [
                        { name: "Soneva Fushi", loc: "Baa Atoll", desc: "Ultra-luxury, no shoes." },
                        { name: "Cinnamon Velifushi", loc: "Vaavu Atoll", desc: "Premium overwater villas." },
                        { name: "Ellaidhoo Maldives", loc: "Ari Atoll", desc: "Exceptional reef snorkeling." },
                        { name: "Villa Nautica", loc: "North Malé", desc: "Nautical-themed activity." },
                        { name: "Villa Park", loc: "South Ari", desc: "Extensive tropical island." },
                        { name: "Cinnamon Hakuraa", loc: "Meemu Atoll", desc: "Calm overwater villa." },
                        { name: "Angaga Island", loc: "Ari Atoll", desc: "Classic Maldives charm." },
                        { name: "Nika Island Resort", loc: "Ari Atoll", desc: "Private beach per villa." },
                        { name: "Arena Beach Resort", loc: "Maafushi", desc: "Accessible resort-style." },
                        { name: "Lagoon View", loc: "South Malé", desc: "Comfortable, scenic views." }
                    ];
                    resorts.forEach(r => {
                        document.write(`
                            <div class="bg-white border border-petal rounded-3xl overflow-hidden p-4">
                                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" class="card-img rounded-2xl mb-4">
                                <h4 class="font-bold text-brandBlue">${r.name}</h4>
                                <p class="text-xs text-brandPink">${r.loc}</p>
                                <p class="text-xs text-gray-500 mt-2">${r.desc}</p>
                                <a href="#" class="text-[10px] text-brandPink uppercase mt-4 block font-bold underline">View Details →</a>
                            </div>
                        `);
                    });
                </script>
            </div>
        </div>
    </div>

    <script>
        function showDirectory() {
            document.getElementById('home-content').classList.add('hidden');
            document.getElementById('directory-content').classList.remove('hidden');
            window.scrollTo(0, 0);
        }
        function showHome() {
            document.getElementById('home-content').classList.remove('hidden');
            document.getElementById('directory-content').classList.add('hidden');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
